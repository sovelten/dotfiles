shell /run/current-system/sw/bin/bash --login
# ── Opacity (Hyprland handles blur via its own rules) ───────────────────────
background_opacity        0.88
dynamic_background_opacity yes

# ── Font ────────────────────────────────────────────────────────────────────
font_family               JetBrainsMono Nerd Font
bold_font                 auto
italic_font               auto
bold_italic_font          auto
font_size                 13.0

# ── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape              block
cursor_blink_interval     0.5
cursor_stop_blinking_after 15.0

# ── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines          10000
wheel_scroll_multiplier   5.0

# ── Window ──────────────────────────────────────────────────────────────────
remember_window_size      yes
initial_window_width      120c
initial_window_height     35c
window_padding_width      8
hide_window_decorations   yes

# ── Tab bar ─────────────────────────────────────────────────────────────────
tab_bar_style             powerline
tab_powerline_style       slanted
# hide tab bar when only one tab is open
tab_bar_min_tabs          2

# ── Bell ────────────────────────────────────────────────────────────────────
enable_audio_bell         no
visual_bell_duration      0.0

# ── Performance ─────────────────────────────────────────────────────────────
repaint_delay             10
input_delay               3
sync_to_monitor           yes

# ── URL handling ────────────────────────────────────────────────────────────
url_style                 curly
open_url_with             default
detect_urls               yes

# ── Clipboard ───────────────────────────────────────────────────────────────
copy_on_select            no
clipboard_control         write-clipboard write-primary read-clipboard-ask read-primary-ask

# ── Key maps (kitty_mod = ctrl+shift by default) ────────────────────────────
map kitty_mod+c           copy_to_clipboard
map kitty_mod+v           paste_from_clipboard
map kitty_mod+equal       change_font_size all +1.0
map kitty_mod+minus       change_font_size all -1.0
map kitty_mod+0           change_font_size all 0
# Opacity nudge: ctrl+shift+a then m (more) / l (less) / 1 (full)
map kitty_mod+a>m         set_background_opacity +0.05
map kitty_mod+a>l         set_background_opacity -0.05
map kitty_mod+a>1         set_background_opacity 1

# ── Shell integration ───────────────────────────────────────────────────────
shell_integration         enabled
